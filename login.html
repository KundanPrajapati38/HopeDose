<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 5px rgba(66, 133, 244, 0.3);
        }
        .btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #3367d6;
        }
        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 14px;
        }
        .options a {
            color: #4285f4;
            text-decoration: none;
        }
        .options a:hover {
            text-decoration: underline;
        }
        .social-login {
            margin-top: 30px;
            text-align: center;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            background-color: #f5f5f5;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .social-btn:hover {
            background-color: #e0e0e0;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .divider-line {
            flex-grow: 1;
            height: 1px;
            background-color: #ddd;
        }
        .divider-text {
            padding: 0 15px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            
            <div class="options">
                <a href="#" id="forgotPassword">Forgot Password?</a>
                <a href="#" id="createAccount">Create Account</a>
            </div>
            
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">or</div>
                <div class="divider-line"></div>
            </div>
            
            <div class="social-login">
                <div class="social-btn" title="Login with Google">G</div>
                <div class="social-btn" title="Login with Facebook">f</div>
                <div class="social-btn" title="Login with Twitter">t</div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Here you would typically send the data to your server for authentication
            console.log('Login attempt:', { username, password });
            
            // For demonstration purposes only
            alert('Login attempt processed. In a real application, this would connect to a server.');
            
            // You can add your authentication logic here or redirect to another page
        });
        
        document.getElementById('forgotPassword').addEventListener('click', function(event) {
            event.preventDefault();
            alert('Forgot password functionality would be implemented here.');
        });
        
        document.getElementById('createAccount').addEventListener('click', function(event) {
            event.preventDefault();
            alert('Account creation page would be linked here.');
        });
    </script>
</body>
</html>
